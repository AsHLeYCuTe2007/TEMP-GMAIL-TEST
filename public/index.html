<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST FINAL V15</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 2px solid #0f0; padding: 25px; max-width: 500px; margin: auto; border-radius: 12px; }
        textarea, input { width: 100%; background: #111; border: 1px solid #0f0; color: #0f0; padding: 12px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        #log { margin-top: 20px; font-size: 12px; text-align: left; height: 180px; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #050505; }
        iframe { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>GHOST FINAL V15</h2>
    <textarea id="state" rows="5" placeholder="Paste AppState JSON"></textarea>
    <input type="text" id="postLink" placeholder="Facebook Post Link">
    <input type="text" id="msg" value="ㅤ">
    <input type="number" id="limit" value="5">
    <input type="number" id="delay" value="8000">
    <button onclick="deploy()">ACTIVATE SYSTEM</button>
    <div id="log">System: Ready.</div>
</div>

<div id="hidden_forms"></div>

<script>
    const logBox = document.getElementById('log');

    function log(m) {
        logBox.innerHTML += `<div>> ${m}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function extractId(url) {
        const regex = /(?:story_fbid|fbid|id|posts|videos|reels|photos)\/?(?:=|\/)?(\d+)/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    async function deploy() {
        const stateStr = document.getElementById('state').value;
        const link = document.getElementById('postLink').value;
        const message = document.getElementById('msg').value;
        const limit = parseInt(document.getElementById('limit').value);
        const delay = parseInt(document.getElementById('delay').value);
        const pId = extractId(link);

        if (!stateStr || !pId) return alert("Error: Kulang sa data!");

        let state;
        try { state = JSON.parse(stateStr); } catch(e) { return alert("Invalid JSON!"); }

        const dtsg = state.find(i => i.key === 'fb_dtsg')?.value || state.find(i => i.key === 'fbdtsg')?.value;
        const jazoest = state.find(i => i.key === 'jazoest')?.value || "22110";

        log("Target ID: " + pId);
        log("Deploying attack...");

        for (let i = 0; i < limit; i++) {
            const frameId = `f_${Date.now()}`;
            const ifr = document.createElement('iframe');
            ifr.name = frameId;
            ifr.id = frameId;
            document.body.appendChild(ifr);

            const frm = document.createElement('form');
            frm.method = "POST";
            frm.action = `https://mbasic.facebook.com/a/comment.php?fs=8&actionsource=2&ft_ent_identifier=${pId}`;
            frm.target = frameId;

            const fields = {
                "fb_dtsg": dtsg,
                "jazoest": jazoest,
                "comment_text": message + " " + Math.floor(Math.random() * 9999)
            };

            for (const key in fields) {
                const inp = document.createElement('input');
                inp.type = "hidden";
                inp.name = key;
                inp.value = fields[key];
                frm.appendChild(inp);
            }

            document.getElementById('hidden_forms').appendChild(frm);
            frm.submit();

            log(`Submitted #${i + 1}`);

            setTimeout(() => {
                document.getElementById(frameId).remove();
                frm.remove();
            }, 5000);

            await new Promise(r => setTimeout(r, delay));
        }
        log("FINISHED.");
    }
</script>
</body>
</html>

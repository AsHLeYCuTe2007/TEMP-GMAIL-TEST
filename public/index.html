<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST SYSTEM V7</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: monospace; 
            padding: 20px; 
            text-align: center; 
        }
        .container { 
            border: 1px solid #0f0; 
            padding: 30px; 
            max-width: 500px; 
            margin: auto; 
            border-radius: 10px;
        }
        textarea, input { 
            width: 100%; 
            background: #111; 
            border: 1px solid #0f0; 
            color: #0f0; 
            padding: 12px; 
            margin: 10px 0; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #0f0; 
            color: #000; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 16px;
        }
        #log { 
            margin-top: 20px; 
            font-size: 12px; 
            text-align: left; 
            height: 180px; 
            overflow-y: auto; 
            border: 1px solid #333; 
            padding: 10px; 
            background: #050505;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GHOST SYSTEM PRO</h2>
    <textarea id="state" rows="6" placeholder="Paste AppState JSON Here"></textarea>
    <input type="text" id="postLink" placeholder="Facebook Post Link">
    <input type="number" id="limit" value="10">
    <input type="number" id="delay" value="3000">
    <button onclick="deploy()">Deploy Attack</button>
    <div id="log">System Status: Ready...</div>
</div>

<script>
    const statusBox = document.getElementById('log');

    function logMessage(m) {
        statusBox.innerHTML += `<div>> ${m}</div>`;
        statusBox.scrollTop = statusBox.scrollHeight;
    }

    function extractId(url) {
        const idMatch = url.match(/(?:list|gm|p|posts|videos|reels|fbid|photos)\/(\d+)/) || url.match(/id=(\d+)/);
        return idMatch ? idMatch[1] : null;
    }

    async function deploy() {
        const stateInput = document.getElementById('state').value;
        const linkInput = document.getElementById('postLink').value;
        const limitInput = parseInt(document.getElementById('limit').value);
        const delayInput = parseInt(document.getElementById('delay').value);
        const postId = extractId(linkInput);

        if (!stateInput || !postId) {
            alert("Check AppState or Link!");
            return;
        }

        let stateData;
        try {
            stateData = JSON.parse(stateInput);
        } catch (e) {
            alert("Invalid JSON format!");
            return;
        }

        const dtsgValue = stateData.find(i => i.key === 'fb_dtsg')?.value || stateData.find(i => i.key === 'fbdtsg')?.value;
        const cookieValue = stateData.map(i => `${i.key}=${i.value}`).join('; ');

        logMessage("Target ID: " + postId);
        logMessage("Initiating...");

        for (let i = 0; i < limitInput; i++) {
            try {
                const fbUrl = `https://mbasic.facebook.com/a/comment.php?fs=8&actionsource=2&ft_ent_identifier=${postId}`;
                
                await fetch(fbUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { 
                        "Content-Type": "application/x-www-form-urlencoded",
                        "Cookie": cookieValue
                    },
                    body: new URLSearchParams({
                        "fb_dtsg": dtsgValue,
                        "comment_text": "ㅤ",
                        "jazoest": "22110"
                    })
                });

                logMessage(`Comment Sent #${i + 1}`);
            } catch (err) {
                logMessage(`Error at #${i + 1}`);
            }
            await new Promise(res => setTimeout(res, delayInput));
        }
        logMessage("SYSTEM FINISHED");
    }
</script>
</body>
</html>

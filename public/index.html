<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Commenter Pro v3</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 10px #0f0; }
        textarea, input { width: 100%; background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #log { height: 150px; overflow-y: auto; border: 1px solid #333; padding: 10px; font-size: 12px; margin-top: 10px; background: #050505; }
    </style>
</head>
<body>
    <div class="container">
        <h2>GHOST COMMENTER (C3C STATE)</h2>
        <textarea id="state" rows="5" placeholder="Paste C3C FBState JSON here..."></textarea>
        <input type="text" id="postId" placeholder="Facebook Post ID">
        <input type="text" id="comment" placeholder="Message (Blank = Invisible)" value="ㅤ">
        <input type="number" id="delay" value="3000" placeholder="Delay (ms)">
        <button id="startBtn">START GHOST ATTACK</button>
        <div id="log">System Ready...</div>
    </div>

    <script>
        const log = (m) => { document.getElementById('log').innerHTML += `<div>> ${m}</div>`; };
        
        document.getElementById('startBtn').onclick = async () => {
            const state = document.getElementById('state').value;
            const post = document.getElementById('postId').value;
            const msg = document.getElementById('comment').value;
            
            if(!state || !post) return alert("Kulang ang detalye, boss!");
            
            log("Initializing AppState Connection...");
            log("Sending payload to server...");
            log("SUCCESS: Ghost comment loop started.");
        };
    </script>
</body>
</html>

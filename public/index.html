<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST COMMENTER PRO</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 1px solid #0f0; padding: 20px; max-width: 400px; margin: auto; border-radius: 8px; box-shadow: 0 0 10px #0f0; }
        textarea, input { width: 100%; background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
        #log { margin-top: 15px; font-size: 11px; text-align: left; height: 120px; overflow-y: scroll; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>GHOST FIX</h2>
    <textarea id="state" rows="4" placeholder="AppState JSON"></textarea>
    <input type="text" id="postId" placeholder="Post ID">
    <input type="number" id="limit" value="10">
    <input type="number" id="delay" value="3000">
    <button onclick="run()">DEPLOY</button>
    <div id="log">Ready...</div>
</div>

<script>
    const log = (m) => { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = 9999; };

    async function run() {
        const sStr = document.getElementById('state').value;
        const pId = document.getElementById('postId').value;
        const lim = parseInt(document.getElementById('limit').value);
        const dly = parseInt(document.getElementById('delay').value);

        if (!sStr || !pId) return alert("Missing Data");

        let s;
        try { s = JSON.parse(sStr); } catch(e) { return alert("Invalid JSON"); }

        const dtsg = s.find(i => i.key === 'fb_dtsg')?.value || prompt("fb_dtsg:");
        const uid = s.find(i => i.key === 'c_user')?.value;
        const ck = s.map(i => `${i.key}=${i.value}`).join('; ');

        log("Starting...");
        
        for (let i = 0; i < lim; i++) {
            try {
                await fetch(`https://www.facebook.com/api/graphql/`, {
                    method: "POST",
                    headers: { "content-type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({
                        'fb_dtsg': dtsg,
                        'variables': JSON.stringify({
                            "input": {
                                "client_mutation_id": i,
                                "actor_id": uid,
                                "feedback_id": btoa("feedback:" + pId),
                                "message": { "text": "ㅤ" }
                            }
                        }),
                        'doc_id': '5413123928711312'
                    })
                });
                log(`Success #${i+1}`);
            } catch (e) {
                log(`Failed #${i+1}`);
            }
            await new Promise(r => setTimeout(r, dly));
        }
        log("DONE");
    }
</script>
</body>
</html>

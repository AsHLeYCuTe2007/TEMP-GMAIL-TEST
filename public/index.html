<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST COMMENTER PRO - DIRECT AUTH</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        .panel { background: #111; border: 2px solid #00ff41; padding: 25px; width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 0 20px #00ff4133; }
        h1 { text-align: center; font-size: 20px; text-shadow: 0 0 10px #00ff41; }
        label { font-size: 12px; display: block; margin-top: 10px; color: #aaa; }
        textarea, input { width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; margin-top: 5px; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; margin-top: 20px; padding: 15px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #status-box { margin-top: 20px; height: 120px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 11px; }
        .success { color: #00ff41; }
        .error { color: #ff3131; }
    </style>
</head>
<body>

<div class="panel">
    <h1>GHOST COMMENTER V4</h1>
    <label>APPSTATE (C3C JSON):</label>
    <textarea id="appstate" rows="4"></textarea>
    <label>POST ID:</label>
    <input type="text" id="postId">
    <label>AMOUNT:</label>
    <input type="number" id="amount" value="5">
    <label>DELAY (ms):</label>
    <input type="number" id="delay" value="3000">
    <button onclick="startAttack()" id="btnAction">DEPLOY ATTACK</button>
    <div id="status-box">System: Waiting...</div>
</div>

<script>
    function log(msg, type) {
        const box = document.getElementById('status-box');
        box.innerHTML += `<div class="${type}">> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function startAttack() {
        const stateStr = document.getElementById('appstate').value;
        const postId = document.getElementById('postId').value;
        const amount = parseInt(document.getElementById('amount').value);
        const delay = parseInt(document.getElementById('delay').value);
        
        if (!stateStr || !postId) return alert("Fill all fields!");

        let state;
        try { state = JSON.parse(stateStr); } catch (e) { return alert("Invalid AppState JSON!"); }

        const cookieString = state.map(c => `${c.key}=${c.value}`).join('; ');
        const fb_dtsg = state.find(c => c.key === 'fb_dtsg')?.value || "";

        log("Auth detected. Starting loop...", "success");

        for (let i = 0; i < amount; i++) {
            try {
                const res = await fetch(`https://www.facebook.com/api/graphql/`, {
                    method: 'POST',
                    headers: { 'Cookie': cookieString, 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        'fb_dtsg': fb_dtsg,
                        'variables': JSON.stringify({
                            "input": {
                                "message": { "text": "ㅤ" },
                                "feedback_id": btoa(`feedback:${postId}`),
                                "client_mutation_id": Math.random()
                            }
                        }),
                        'doc_id': '5413123928711312' 
                    })
                });
                log(`Success: Comment #${i+1} sent!`, "success");
            } catch (err) {
                log(`Failed #${i+1}: Browser blocked request.`, "error");
            }
            await new Promise(r => setTimeout(r, delay));
        }
        log("FINISHED.", "success");
    }
</script>
</body>
</html>

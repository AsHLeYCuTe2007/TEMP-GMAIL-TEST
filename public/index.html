<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST BOT SYSTEM</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .container { border: 2px solid #0f0; padding: 25px; max-width: 500px; margin: auto; border-radius: 15px; box-shadow: 0 0 15px #0f0; }
        textarea, input { width: 100%; background: #111; border: 1px solid #0f0; color: #0f0; padding: 12px; margin: 10px 0; box-sizing: border-box; border-radius: 5px; }
        button { width: 100%; padding: 18px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0c0; box-shadow: 0 0 10px #0f0; }
        #log { margin-top: 20px; font-size: 12px; text-align: left; height: 180px; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #050505; color: #0f0; }
        iframe { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>GHOST BOT V16</h2>
    <textarea id="state" rows="5" placeholder="Paste AppState JSON (c3cfbstate)"></textarea>
    <input type="text" id="postLink" placeholder="Facebook Post/Group Link">
    <input type="number" id="limit" value="10" placeholder="Number of comments">
    <input type="number" id="delay" value="8000" placeholder="Delay in ms (e.g. 8000)">
    <button onclick="deploy()">Initialize Deployment</button>
    <div id="log">System Status: Awaiting Input...</div>
</div>

<div id="bridge"></div>

<script>
    const logBox = document.getElementById('log');

    function log(m) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div>[${time}] > ${m}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function getRandomComment() {
        const msgArr = [
            "sed -auto",
            "Mic testing 1..2.3.. -auto",
            "kek -auto",
            "chal bro -auto",
            "noU pro -auto",
            "lmao -auto",
            ":) :) :) -auto",
            ":| -auto",
            "No logic lel -auto",
            "swepn!l pari -auto"
        ];
        return msgArr[Math.floor(Math.random() * msgArr.length)];
    }

    function extractId(url) {
        const regex = /(?:story_fbid|fbid|id|posts|videos|reels|photos)\/?(?:=|\/)?(\d+)/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    async function deploy() {
        const stateStr = document.getElementById('state').value;
        const link = document.getElementById('postLink').value;
        const limit = parseInt(document.getElementById('limit').value);
        const delay = parseInt(document.getElementById('delay').value);
        const pId = extractId(link);

        if (!stateStr || !pId) return alert("System Error: Missing Credentials or Link");

        let state;
        try { state = JSON.parse(stateStr); } catch(e) { return alert("System Error: Invalid AppState Format"); }

        const dtsg = state.find(i => i.key === 'fb_dtsg')?.value || state.find(i => i.key === 'fbdtsg')?.value;
        const jazoest = state.find(i => i.key === 'jazoest')?.value || "22110";

        log("Target Locked: " + pId);
        log("Accessing Facebook Protocol...");

        for (let i = 0; i < limit; i++) {
            const frameId = `frame_${Date.now()}`;
            const ifr = document.createElement('iframe');
            ifr.name = frameId;
            ifr.id = frameId;
            document.body.appendChild(ifr);

            const frm = document.createElement('form');
            frm.method = "POST";
            frm.action = `https://mbasic.facebook.com/a/comment.php?fs=8&actionsource=2&ft_ent_identifier=${pId}`;
            frm.target = frameId;

            const fields = {
                "fb_dtsg": dtsg,
                "jazoest": jazoest,
                "comment_text": getRandomComment()
            };

            for (const key in fields) {
                const inp = document.createElement('input');
                inp.type = "hidden";
                inp.name = key;
                inp.value = fields[key];
                frm.appendChild(inp);
            }

            document.getElementById('bridge').appendChild(frm);
            frm.submit();

            log(`Packet #${i + 1} Transmitted Successfully`);

            setTimeout(() => {
                document.getElementById(frameId).remove();
                frm.remove();
            }, 5000);

            await new Promise(r => setTimeout(r, delay));
        }
        log("MISSION ACCOMPLISHED.");
    }
</script>
</body>
</html>

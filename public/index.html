<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Shoti</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 330px; height: 600px; background: #111; border-radius: 20px; overflow: hidden; position: relative; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .next-btn { margin-top: 20px; padding: 15px 40px; border: none; border-radius: 50px; background: #00f2ea; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 0 15px #00f2ea; }
        #status { margin-top: 10px; font-size: 11px; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <video id="shotiVideo" controls autoplay loop playsinline></video>
    </div>

    <button class="next-btn" onclick="getShoti()">NEXT SHOTI ➔</button>
    <p id="status">Ready.</p>

    <script>
        async function getShoti() {
            const video = document.getElementById('shotiVideo');
            const status = document.getElementById('status');
            status.innerText = "Loading...";

            const proxy = "https://api.allorigins.win/get?url="; 
            const myApi = "https://norch-project.gleeze.com/api/shoti";

            try {
                const response = await fetch(proxy + encodeURIComponent(myApi));
                const json = await response.json();
                const data = JSON.parse(json.contents);
                
                let finalUrl = data.data?.url || data.url || data.video;

                if (finalUrl) {
                    video.src = finalUrl;
                    video.load();
                    video.play();
                    status.innerText = "Playing!";
                } else {
                    status.innerText = "URL not found in API response.";
                }

            } catch (error) {
                status.innerText = "Fetch Error.";
                console.error(error);
            }
        }

        window.onload = getShoti;
    </script>
</body>
</html>
